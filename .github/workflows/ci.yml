name: Simeis CI

on:
  pull_request:
    branches: [ main, "release/*" ]
  push:
    branches: [ main ]

# --- Gestion des interruptions de flux (TP3 - Partie 3.5 & TP4) ---
# Annule automatiquement les builds obsolètes si un nouveau commit est poussé
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

# Permissions requises pour permettre à l'outil 'gh' d'ajouter un label sur la PR
permissions:
  pull-requests: write
  contents: read

jobs:
  # --- 1. JOB LINT (Python & Rust Format) ---
  lint:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Ruff (Linter Python)
        run: pip install ruff --break-system-packages
      - name: Python Linting
        run: ruff check .
      - name: Rust Format Check
        run: cargo fmt --check

  # --- 2. JOB TEST (Unit Tests & Property-Based) ---
  test:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Rust - Tests unitaires
        run: make test

      # Intégration Partie 3.2 : Exécution rapide du test property-based sur chaque PR
      - name: Python - Property-Based Testing (Quick)
        run: python3 tests/propertybased.py

  # --- 3. JOB BUILD DEV (Compilation simple) ---
  build_dev:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Développement - Check & Build
        run: make build

  # --- 4. JOB QUALITY (Clippy & Advanced Checks) ---
  quality:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Rust - Clippy
        run: cargo clippy -- -D warnings

  # --- 5. JOB COVERAGE (TP3 - Partie 2) ---
  # Ce job vérifie le taux de couverture et applique le label via 'gh' si < 50%
  coverage:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # OPTIMISATION (TP4) : Téléchargement du binaire pré-compilé pour éviter 10 minutes de compilation
      - name: Install Precompiled cargo-tarpaulin
        run: |
          wget https://github.com/xdg-acme/cargo-tarpaulin/releases/download/0.27.3/cargo-tarpaulin-0.27.3-musl.tar.gz
          tar -xvf cargo-tarpaulin-0.27.3-musl.tar.gz
          sudo mv cargo-tarpaulin /usr/local/bin/
          cargo tarpaulin --version

      - name: Evaluate Code Coverage & Labeling
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Exécution de tarpaulin et capture du résultat brut
          cargo tarpaulin --out stdout > coverage_report.txt
          cat coverage_report.txt
          
          # Extraction du pourcentage (gestion robuste de la chaîne textuelle)
          COVERAGE_RAW=$(grep -oE '[0-9.]+%' coverage_report.txt | head -n 1 | tr -d '%')
          echo "Pourcentage brut de code coverage : $COVERAGE_RAW%"
          
          # Extraction de la partie entière pour éviter l'utilisation de 'bc' qui est absent par défaut
          COVERAGE_INT=${COVERAGE_RAW%.*}
          if [ -z "$COVERAGE_INT" ]; then COVERAGE_INT=0; fi
          echo "Valeur entière retenue pour le test : $COVERAGE_INT%"
          
          # Vérification de la limite de 50%
          if [ "$COVERAGE_INT" -lt 50 ]; then
            echo "[-] Couverture insuffisante (< 50%). Ajout du label sur la PR..."
            gh pr edit ${{ github.event.pull_request.number }} --add-label "not enough tests"
          else
            echo "[+] Couverture suffisante (>= 50%). Pas de modification de label nécessaire."
          fi

  # --- 6. JOB PRODUCTION (Merge dans main uniquement) ---
  release_and_doc:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Typst
        run: |
          wget https://github.com/typst/typst/releases/latest/download/typst-x86_64-unknown-linux-musl.tar.xz
          tar -xvf typst-x86_64-unknown-linux-musl.tar.xz
          sudo cp typst-x86_64-unknown-linux-musl/typst /usr/local/bin/
      - name: Compilation Release
        run: make release
      - name: Compilation Documentation
        run: make doc