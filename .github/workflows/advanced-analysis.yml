name: Advanced Code Analysis

on:
  push:
    branches:
      - "release/**"

jobs:
  # ─────────────────────────────────────────────
  # Job 1 : Tests unitaires avec la feature heavy-testing
  # ─────────────────────────────────────────────
  unit-tests:
    name: Unit tests (heavy-testing)
    runs-on: ubuntu-latest

    steps:
      # Utilisation de l'action de base checkout explicitement autorisée
      - name: Checkout repository
        uses: actions/checkout@v6

      # Remplacement de dtolnay/rust-toolchain par une installation manuelle par script (Consigne TP)
      - name: Install Rust toolchain (Stable)
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      # Note : L'action actions/cache a été retirée car les actions tierces du marketplace sont interdites
      - name: Run unit tests with feature heavy-testing
        run: cargo test --features heavy-testing

  # ─────────────────────────────────────────────
  # Job 2 : Tests fonctionnels (build debug + script Python)
  # ─────────────────────────────────────────────
  functional-tests:
    name: Functional tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Rust toolchain (Stable)
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      # L'environnement ubuntu-latest intègre déjà Python 3 par défaut, 
      # ce qui permet de se passer de l'action marketplace setup-python.

      - name: Compile project (debug) with feature heavy-testing
        run: cargo build --features heavy-testing

      # Partie 1.3 du TP : Liaison du script de tests fonctionnels à la CI lourde
      - name: Run functional test script
        run: python3 tests/functional_tests.py

      # Partie 3.4 du TP : Liaison de la version lourde du test property-based (--heavy)
      # Ce test s'exécutera de manière intensive sur chaque push de release
      - name: Run heavy property-based tests
        run: python3 tests/propertybased.py --heavy

  # ─────────────────────────────────────────────
  # Job 3 : Analyse approfondie du code
  # ─────────────────────────────────────────────
  deep-analysis:
    name: Deep code analysis
    runs-on: ubuntu-latest
    needs: [unit-tests, functional-tests]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      # Installation manuelle de la version Nightly de Rust requise pour cargo-udeps
      - name: Install Rust toolchain (Nightly)
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain nightly
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      # ── cargo-audit ───────────────────────────
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Audit security of dependencies
        run: cargo audit

      # ── cargo-udeps ───────────────────────────
      - name: Install cargo-udeps
        run: cargo install cargo-udeps --locked

      # Analyse des dépendances inutilisées avec la version Nightly configurée plus haut
      - name: Check for unused dependencies
        run: cargo +nightly udeps --all-targets