name: Release - Automatisation & Changelog

on:
  pull_request:
    types: [closed]
    branches:
      - 'release/*'

jobs:
  create_release:
    name: Generation de la Release Officielle
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build Rust Server in Release Mode
        run: |
          echo "=== Compilation du serveur en mode Release ==="
          cargo build --release --manifest-path simeis-server/Cargo.toml

      - name: Prepare Artifacts Archive
        run: |
          echo "=== Preparation du package d'artefacts ==="
          mkdir -p dist/
          cp target/release/simeis-server dist/
          mkdir -p sdk && echo "# SDK" > sdk/python.py
          cp sdk/python.py dist/
          zip -r simeis-artifacts.zip dist/

      - name: Create Debian Package Architecture
        run: |
          echo "=== Preparation de l'arborescence Debian ==="
          mkdir -p debian-package/DEBIAN
          mkdir -p debian-package/usr/bin
          mkdir -p debian-package/usr/share/man/man1
          mkdir -p debian-package/etc/systemd/system

          cat << 'EOF' > debian-package/DEBIAN/control
          Package: simeis
          Version: 1.0.0
          Section: utils
          Priority: optional
          Architecture: amd64
          Depends: cmatrix
          Maintainer: Evan <evan@ynov.com>
          Description: Serveur Simeis avec supervision Systemd et dependance fun.
          EOF

          cat << 'EOF' > debian-package/DEBIAN/postinst
          #!/bin/bash
          set -e
          echo "[+] Configuration post-installation de Simeis..."
          if ! id "simeis" &>/dev/null; then
              useradd --system --home-dir /var/lib/simeis --create-home --shell /usr/sbin/nologin simeis
          fi
          chmod 755 /usr/bin/simeis
          chown root:root /usr/bin/simeis
          systemctl daemon-reload
          systemctl enable simeis.service
          systemctl restart simeis.service
          echo "[+] Installation terminee. Hackerman active !"
          EOF
          chmod +x debian-package/DEBIAN/postinst

          cat << 'EOF' > debian-package/etc/systemd/system/simeis.service
          [Unit]
          Description=Simeis Server Daemon
          After=network.target

          [Service]
          Type=simple
          User=simeis
          Group=simeis
          ExecStart=/usr/bin/simeis
          Restart=on-failure

          [Install]
          WantedBy=multi-user.target
          EOF

          cat << 'EOF' > debian-package/usr/share/man/man1/simeis.1
          .TH SIMEIS 1 "24 Juin 2026" "1.0.0" "Simeis Manual"
          .SH NAME
          simeis \- Serveur d'infrastructure Simeis
          .SH DESCRIPTION
          Simeis est une solution serveur automatisee et surveillee par Systemd.
          .SH AUTHOR
          Evan (Zerby)
          EOF

          cp target/release/simeis-server debian-package/usr/bin/simeis

          echo "=== Compilation du paquet .deb ==="
          dpkg-deb --build debian-package simeis_1.0.0_amd64.deb

      - name: Generate Changelog and Release via GitHub CLI
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TARGET_BRANCH: ${{ github.event.pull_request.base.ref }}
        run: |
          echo "=== Recuperation de toutes les PRs de la release ==="
          TAG_NAME="${TARGET_BRANCH//release\//}"
          
          echo "## 🚀 Release Notes - $TAG_NAME" > changelog.md
          echo "" >> changelog.md
          
          echo "### 🌟 Features" > features.md
          echo "### 🐛 Bugfixes" > bugfixes.md
          echo "### 📦 Autres changements" > others.md

          gh pr list --base "$TARGET_BRANCH" --state merged --json title,number,url,headRefName,author --limit 100 > all_prs.json

          jq -c '.[]' all_prs.json | while read -r pr; do
            TITLE=$(echo "$pr" | jq -r '.title')
            NUMBER=$(echo "$pr" | jq -r '.number')
            URL=$(echo "$pr" | jq -r '.url')
            SOURCE_BRANCH=$(echo "$pr" | jq -r '.headRefName')
            AUTHOR=$(echo "$pr" | jq -r '.author.login')

            LINE="- $TITLE ([#$NUMBER]($URL)) @$AUTHOR"

            if [[ "$SOURCE_BRANCH" == feature/* ]]; then
              echo "$LINE" >> features.md
            elif [[ "$SOURCE_BRANCH" == bug/* ]]; then
              echo "$LINE" >> bugfixes.md
            else
              echo "$LINE" >> others.md
            fi
          done

          cat features.md >> changelog.md
          echo "" >> changelog.md
          cat bugfixes.md >> changelog.md
          echo "" >> changelog.md
          cat others.md >> changelog.md

          rm all_prs.json features.md bugfixes.md others.md

          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            echo "[+] Mise a jour de la release existante $TAG_NAME..."
            gh release edit "$TAG_NAME" --notes-file changelog.md
            gh release upload "$TAG_NAME" simeis-artifacts.zip simeis_1.0.0_amd64.deb --clobber
          else
            echo "[+] Creation de la release officielle $TAG_NAME..."
            gh release create "$TAG_NAME" simeis-artifacts.zip simeis_1.0.0_amd64.deb \
              --title "Release $TAG_NAME" \
              --notes-file changelog.md \
              --target "$TARGET_BRANCH"
          fi