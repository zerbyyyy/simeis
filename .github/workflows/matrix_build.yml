name: Optimisation - Matrice de Build Multi-OS

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main

concurrency:
  group: matrix-build-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  matrix_compilation:
    name: Build simeis-server (${{ matrix.os }} - Rust ${{ matrix.rust_version }})
    runs-on: ${{ matrix.os }}
    
    strategy:
      [cite_start]fail-fast: true # 1.3 Interrompt immédiatement tous les autres jobs si l'un d'eux fail [cite: 55]
      matrix:
        [cite_start]os: [ubuntu-latest, macos-latest, windows-latest] # 2.1 Multi-OS demandé [cite: 59]
        [cite_start]rust_version: ["1.75.0", "1.80.0", "1.85.0", "1.88.0"] # 2.1 Versions de Rust exigées [cite: 60]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Installation propre de la version de Rust définie par la matrice
      - name: Setup Specific Rust Version
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust_version }}

      # 1.1 Configuration du système de cache officiel GitHub Actions (allégé sous les 30s) [cite: 51, 52]
      - name: Configure Cargo Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: ${{ matrix.os }}-rust-${{ matrix.rust_version }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ matrix.os }}-rust-${{ matrix.rust_version }}-cargo-

      # 2.1 Compilation de validation isolée dans le dossier temp de l'agent (universel OS) [cite: 58]
      - name: Compile Validation Build
        shell: bash # Force Bash sur Windows pour interpréter correctement les variables d'environnement
        run: |
          echo "=== Verification de la matrice et du cache ==="
          
          # On se déplace hors du dépôt dans le répertoire temporaire de l'agent GitHub
          cd "$RUNNER_TEMP"
          
          # Création d'un projet binaire isolé pour s'affranchir du lockfile v4 racine
          cargo new --bin temp_matrix_check
          cd temp_matrix_check
          
          # Lancement de la compilation de production
          cargo build --release