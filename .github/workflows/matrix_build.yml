name: Optimisation - Matrice de Build Multi-OS

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main

concurrency:
  group: matrix-build-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  matrix_compilation:
    name: Build simeis-server (${{ matrix.os }} - Rust ${{ matrix.rust_version }})
    runs-on: ${{ matrix.os }}
    
    strategy:
      fail-fast: true # 1.3 Interrompt tout si un job fail
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest] # Multi-OS
        rust_version: ["1.75.0", "1.80.0", "1.85.0", "1.88.0"] # Les versions exactes du TP 

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Installation propre de la version de la matrice
      - name: Setup Specific Rust Version
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust_version }}

      # 1.1 Système de cache officiel (sans target/ pour rester sous les 30s) [cite: 51, 52]
      - name: Configure Cargo Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: ${{ matrix.os }}-rust-${{ matrix.rust_version }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ matrix.os }}-rust-${{ matrix.rust_version }}-cargo-

      # Compilation ciblée sur simeis-server en mode release [cite: 58]
      - name: Compile Simeis in Release Mode
        run: |
          echo "=== Lancement de la compilation de production ==="
          cargo build --release --manifest-path simeis-server/Cargo.toml