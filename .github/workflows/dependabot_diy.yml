name: DIY Dependabot

on:
  schedule:
    # Déclenchement cyclique : Tous les lundis à minuit (UTC)
    - cron: '0 0 * * 1'
  workflow_dispatch: # Permet de lancer le bot manuellement pour tester

permissions:
  contents: write
  pull-requests: write

jobs:
  update-dependencies:
    runs-on: ubuntu-latest
    # Contrainte : Ne s'exécute que sur la branche main (ou master selon ton flux principal)
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    steps:
      # Seule action autorisée
      - name: Checkout code
        uses: actions/checkout@v4

      # OPTIMISATION (TP4) : On utilise la commande native cargo qui prend 2 secondes au lieu de compiler un package externe
      - name: Update Cargo.lock Dependencies
        run: |
          echo "=== Vérification de l'environnement Rust ==="
          cargo --version
          echo "=== Recherche et application des mises à jour ==="
          cargo update

      - name: Handle Pull Request Logic
        id: pr_logic
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # On vérifie si le fichier Cargo.lock a été modifié par 'cargo update'
          if [[ -n "$(git status --porcelain Cargo.lock)" ]]; then
            echo "[+] Des mises à jour de dépendances ont été détectées."
            
            # Configuration de l'identité du bot Git
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            
            # Création et bascule sur la branche dédiée aux dépendances
            git checkout -b bot/update-deps
            git add Cargo.lock
            git commit -m "chore: update dependencies via DIY Dependabot"
            
            # Le push --force met à jour le code de la PR existante si elle est déjà ouverte
            git push origin bot/update-deps --force

            # Vérification robuste via la CLI gh pour savoir si la PR existe déjà
            PR_EXISTS=$(gh pr list --head "bot/update-deps" --base "main" --json number --jq '.[0].number')

            if [ -z "$PR_EXISTS" ]; then
              echo "[+] Aucune PR existante. Création de la Pull Request..."
              gh pr create \
                --title "Update dependencies" \
                --body "Mise à jour automatique et cyclique des dépendances Rust (\`Cargo.lock\`)." \
                --label "bot/update" \
                --base main \
                --head bot/update-deps
              
              # Ajout de l'auto-approbation pour débloquer l'exécution des tests
              echo "[+] Auto-approbation des workflows pour débloquer la PR..."
              gh pr review --approve bot/update-deps || echo "[-] Auto-approbation ignorée."
            else
              echo "[+] La PR #${PR_EXISTS} existe déjà. Elle a été automatiquement mise à jour par le push force. Pipeline réussi ! ✅"
            fi
          else
            echo "[+] Toutes les dépendances sont déjà à jour. Rien à faire ! ✅"
          fi