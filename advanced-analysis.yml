name: Advanced Code Analysis

on:
  push:
    branches:
      - "release/**"

jobs:
  # ─────────────────────────────────────────────
  # Job 1 : Tests unitaires avec la feature heavy-testing
  # ─────────────────────────────────────────────
  unit-tests:
    name: Unit tests (heavy-testing)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Run unit tests with feature heavy-testing
        run: cargo test --features heavy-testing

  # ─────────────────────────────────────────────
  # Job 2 : Tests fonctionnels (build debug + script Python)
  # ─────────────────────────────────────────────
  functional-tests:
    name: Functional tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Compile project (debug) with feature heavy-testing
        run: cargo build --features heavy-testing

      - name: Run functional test script
        run: python tests/functional_tests.py

      # La step échoue automatiquement si le script retourne un code != 0,
      # ce qui constitue la vérification du succès de l'exécution.

  # ─────────────────────────────────────────────
  # Job 3 : Analyse approfondie du code
  # ─────────────────────────────────────────────
  deep-analysis:
    name: Deep code analysis
    runs-on: ubuntu-latest
    needs: [unit-tests, functional-tests]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain (nightly requis pour cargo-udeps)
        uses: dtolnay/rust-toolchain@nightly

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-nightly-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-nightly-

      # ── cargo-audit ───────────────────────────
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Audit security of dependencies
        run: cargo audit

      # ── cargo-udeps ───────────────────────────
      - name: Install cargo-udeps
        run: cargo install cargo-udeps --locked

      - name: Check for unused dependencies
        run: cargo +nightly udeps --all-targets
