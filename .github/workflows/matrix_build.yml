name: Optimisation - Matrice de Build Multi-OS

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main

concurrency:
  group: matrix-build-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  matrix_compilation:
    name: Build simeis-server
    runs-on: ${{ matrix.os }}
    
    strategy:
      fail-fast: true
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        rust_version: ["1.88.0", "1.89.0", "1.90.0", "1.91.0"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Specific Rust Version
        shell: bash
        run: |
          echo "=== Configuration de la version Rust ==="
          rustup toolchain install ${{ matrix.rust_version }} --profile minimal
          rustup default ${{ matrix.rust_version }}
          rustc --version

      - name: Compile Simeis in Release Mode
        shell: bash
        run: |
          echo "=== Lancement de la compilation de production ==="
          cargo build --release --verbose