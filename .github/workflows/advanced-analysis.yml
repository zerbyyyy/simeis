name: Advanced Code Analysis

on:
  push:
    branches:
      - "release/**"

jobs:
  # ─────────────────────────────────────────────
  # Job 1 : Tests unitaires avec la feature heavy-testing
  # ─────────────────────────────────────────────
  unit-tests:
    name: Unit tests (heavy-testing)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Utilisation du compilateur stable préinstallé par défaut sur la VM
      - name: Run unit tests with feature heavy-testing
        run: cargo test --features heavy-testing --verbose

  # ─────────────────────────────────────────────
  # Job 2 : Tests fonctionnels (build debug + script Python)
  # ─────────────────────────────────────────────
  functional-tests:
    name: Functional tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Compile project (debug) with feature heavy-testing
        run: cargo build --features heavy-testing --verbose

      - name: Run functional test script
        run: python3 tests/functional_tests.py

      - name: Run heavy property-based tests
        run: python3 tests/propertybased.py --heavy

  # ─────────────────────────────────────────────
  # Job 3 : Analyse approfondie du code
  # ─────────────────────────────────────────────
  deep-analysis:
    name: Deep code analysis
    runs-on: ubuntu-latest
    needs: [unit-tests, functional-tests]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Installation de la version Nightly de Rust requise pour cargo-udeps
      - name: Install Rust toolchain (Nightly)
        run: |
          rustup toolchain install nightly --profile minimal
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      # Installation de cargo-audit (Version binaire pré-compilée très rapide)
      - name: Download and Install Precompiled cargo-audit
        run: |
          echo "=== Récupération du binaire pré-compilé de cargo-audit ==="
          wget https://github.com/rustsec/rustsec/releases/download/cargo-audit%2Fv0.20.0/cargo-audit-x86_64-unknown-linux-gnu-v0.20.0.tgz
          tar -xvf cargo-audit-x86_64-unknown-linux-gnu-v0.20.0.tgz
          sudo mv x86_64-unknown-linux-gnu/cargo-audit /usr/local/bin/
          cargo audit --version

      - name: Audit security of dependencies
        run: cargo audit

      # Installation de cargo-udeps (Version binaire pré-compilée très rapide)
      - name: Download and Install Precompiled cargo-udeps
        run: |
          echo "=== Récupération du binaire pré-compilé de cargo-udeps ==="
          wget https://github.com/est31/cargo-udeps/releases/download/v0.1.50/cargo-udeps-v0.1.50-x86_64-unknown-linux-gnu.tar.gz
          tar -xvf cargo-udeps-v0.1.50-x86_64-unknown-linux-gnu.tar.gz
          sudo mv cargo-udeps-v0.1.50-x86_64-unknown-linux-gnu/cargo-udeps /usr/local/bin/
          cargo udeps --version

      # Détection des crates inutilisées avec le compilateur Nightly
      - name: Check for unused dependencies
        run: cargo +nightly udeps --all-targets