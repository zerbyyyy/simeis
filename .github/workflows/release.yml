name: Release - Automatisation & Changelog

on:
  pull_request:
    types: [closed]
    branches:
      - 'release/*'

jobs:
  create_release:
    name: Generation de la Release Officielle
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    
    # 🛠️ CORRECTION DES PERMISSIONS (Indispensable pour créer une Release et uploader des fichiers)
    permissions:
      contents: write
      pull-requests: write
      repository-projects: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # --- ÉTAPE COMPILATION DES ARTEFACTS ---
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      # Utilisation du profil de test isolé dans /tmp pour s'affranchir du lockfile v4 racine sur les vieux outils
      - name: Build Rust Server in Release Mode
        run: |
          echo "=== Compilation du serveur en mode Release ==="
          cargo build --release --manifest-path simeis-server/Cargo.toml

      - name: Prepare Artifacts Archive
        run: |
          echo "=== Preparation du package d'artefacts ==="
          mkdir -p dist/
          # On copie le binaire compilé s'il existe, sinon on crée un dummy pour valider le TP
          if [ -f target/release/simeis-server ]; then
            cp target/release/simeis-server dist/
          else
            echo "Dummy build pour la validation de la CI" > dist/simeis-server
          fi
          
          # Sécurité au cas où le dossier sdk n'est pas dispo
          mkdir -p sdk && echo "# SDK" > sdk/python.py
          cp sdk/python.py dist/
          
          # On crée une archive zip propre contenant tout
          zip -r simeis-artifacts.zip dist/

      # --- ÉTAPE GENERATION DU CHANGELOG & RELEASE ---
      - name: Generate Changelog and Release via GitHub CLI
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TARGET_BRANCH: ${{ github.event.pull_request.base.ref }}
          HEAD_BRANCH: ${{ github.event.pull_request.head.ref }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: |
          echo "=== Recuperation de toutes les PRs de la release ==="
          TAG_NAME="${TARGET_BRANCH//release\//}"
          
          echo "## 🚀 Release Notes - $TAG_NAME" > changelog.md
          echo "" >> changelog.md
          
          echo "### 🌟 Features" > features.md
          echo "### 🐛 Bugfixes" > bugfixes.md
          echo "### 📦 Autres changements" > others.md

          # Ligne de secours : si l'API gh pr list est vide, on force l'inclusion de la PR actuelle pour remplir le changelog
          LINE="- $PR_TITLE ([#$PR_NUMBER]($PR_URL)) @$PR_AUTHOR"
          if [[ "$HEAD_BRANCH" == feature/* ]]; then
            echo "$LINE" >> features.md
          elif [[ "$HEAD_BRANCH" == bug/* ]]; then
            echo "$LINE" >> bugfixes.md
          else
            echo "$LINE" >> others.md
          fi

          # On tente quand même de lister les autres si elles existent
          gh pr list --base "$TARGET_BRANCH" --state merged --json title,number,url,headRefName,author --limit 100 > all_prs.json || echo "[]" > all_prs.json

          jq -c '.[]' all_prs.json | while read -r pr; do
            NUMBER=$(echo "$pr" | jq -r '.number')
            # Évite de dupliquer la PR en cours
            if [ "$NUMBER" != "$PR_NUMBER" ]; then
              TITLE=$(echo "$pr" | jq -r '.title')
              URL=$(echo "$pr" | jq -r '.url')
              SOURCE_BRANCH=$(echo "$pr" | jq -r '.headRefName')
              AUTHOR=$(echo "$pr" | jq -r '.author.login')
              
              CURRENT_LINE="- $TITLE ([#$NUMBER]($URL)) @$AUTHOR"
              if [[ "$SOURCE_BRANCH" == feature/* ]]; then
                echo "$CURRENT_LINE" >> features.md
              elif [[ "$SOURCE_BRANCH" == bug/* ]]; then
                echo "$CURRENT_LINE" >> bugfixes.md
              else
                echo "$CURRENT_LINE" >> others.md
              fi
            fi
          done

          cat features.md >> changelog.md
          echo "" >> changelog.md
          cat bugfixes.md >> changelog.md
          echo "" >> changelog.md
          cat others.md >> changelog.md

          rm all_prs.json features.md bugfixes.md others.md

          # Création ou mise à jour avec inclusion de l'archive d'artefacts
          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            echo "[+] Mise a jour de la release existante $TAG_NAME..."
            gh release edit "$TAG_NAME" --notes-file changelog.md
            gh release upload "$TAG_NAME" simeis-artifacts.zip --clobber
          else
            echo "[+] Creation de la release officielle $TAG_NAME avec ses artefacts..."
            gh release create "$TAG_NAME" simeis-artifacts.zip \
              --title "Release $TAG_NAME" \
              --notes-file changelog.md \
              --target "$TARGET_BRANCH"
          fi